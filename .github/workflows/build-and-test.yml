name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Go Tests
    runs-on: windows-latest

    env:
      GOOS: windows
      GOARCH: amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Verify Go installation
        run: go version

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...
